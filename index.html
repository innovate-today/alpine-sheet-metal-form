<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>Alpine Sheet Metal Systems</title>
    <meta name="application-name" content="Alpine Sheet Metal Systems" />
    <meta name="apple-mobile-web-app-title" content="Alpine Sheet Metal" />
    <meta name="theme-color" content="#1B4F8A" />
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
    <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          :root {
                  --brand: #1B4F8A;
                  --brand-dark: #153d6e;
                  --brand-light: #eef3fb;
                  --gray-50: #f9fafb;
                  --gray-100: #f3f4f6;
                  --gray-200: #e5e7eb;
                  --gray-400: #9ca3af;
                  --gray-600: #4b5563;
                  --gray-800: #1f2937;
                  --radius: 12px;
          }
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-50); min-height: 100dvh; color: var(--gray-800); }
          .safe-top { height: env(safe-area-inset-top); background: var(--brand); }
          .safe-bottom { height: env(safe-area-inset-bottom); background: var(--gray-50); }
          header { background: var(--brand); padding: 16px 20px 20px; display: flex; align-items: center; gap: 14px; }
          header img { width: 48px; height: 48px; border-radius: 10px; object-fit: contain; background: white; padding: 4px; }
          header .title-block h1 { font-size: 18px; font-weight: 700; color: white; line-height: 1.2; }
          header .title-block p { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 2px; }
          main { padding: 20px 16px; max-width: 540px; margin: 0 auto; }
          .card { background: white; border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 20px; margin-bottom: 16px; }
          .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--brand); margin-bottom: 16px; }
          .field { margin-bottom: 14px; }
          .field label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
          .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 15px; color: var(--gray-800); background: var(--gray-50); appearance: none; -webkit-appearance: none; outline: none; transition: border-color 0.15s; }
          .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); background: white; }
          .field textarea { resize: vertical; min-height: 90px; }
          .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
          .radio-group { display: flex; flex-direction: column; gap: 8px; }
          .radio-option { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
          .radio-option:has(input:checked) { border-color: var(--brand); background: var(--brand-light); }
          .radio-option input[type="radio"] { accent-color: var(--brand); width: 16px; height: 16px; flex-shrink: 0; }
          .radio-option span { font-size: 14px; color: var(--gray-800); }
          .submit-btn { width: 100%; padding: 14px; background: var(--brand); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; letter-spacing: 0.02em; cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 4px; }
          .submit-btn:active { background: var(--brand-dark); transform: scale(0.98); }
          .success-screen { display: none; text-align: center; padding: 48px 24px; }
          .success-screen.visible { display: block; }
          .success-icon { width: 72px; height: 72px; background: var(--brand-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
          .success-icon svg { stroke: var(--brand); }
          .success-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
          .success-screen p { font-size: 15px; color: var(--gray-600); line-height: 1.6; }
          .back-btn { margin-top: 28px; display: inline-block; padding: 10px 24px; border: 1px solid var(--brand); border-radius: 8px; color: var(--brand); font-size: 14px; font-weight: 500; cursor: pointer; background: none; }
          .fab { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); right: 20px; z-index: 999; display: flex; align-items: center; gap: 8px; background: #1a1a2e; color: white; border: none; border-radius: 50px; padding: 11px 16px 11px 12px; font-size: 13px; font-weight: 600; letter-spacing: 0.01em; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.25); transition: transform 0.15s, box-shadow 0.15s; white-space: nowrap; }
          .fab:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
          .fab-icon { width: 26px; height: 26px; background: #00b4d8; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .fab-icon svg { width: 15px; height: 15px; fill: white; }
        </style>
  </head>
  <body>
      <div class="safe-top"></div>div>
      <header>
            <img src="icons/icon-180.png" alt="Logo" />
            <div class="title-block">
                    <h1>Alpine Sheet Metal</h1>
                  <p>Service Request Form</p>
            </div>div>
      </header>
    <main>
          <div class="success-screen" id="success">
                  <div class="success-icon">
                            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"/>
                               
    </main></p></h1>
      </header>
  </body>
    </style></title>
  </head>
