<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alpine Sheet Metal Systems</title>
  <meta name="application-name" content="Alpine SMS" />
  <meta name="apple-mobile-web-app-title" content="Alpine SMS" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#12345C" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Alpine%20A-v2.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Alpine%20A-v2.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Alpine%20A-v2.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #12345C;
      color: white;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(27,79,138,0.7) 0%, transparent 65%);
    }
    .logo-area {
      display: flex; flex-direction: column; align-items: center;
      gap: 18px; padding-top: calc(env(safe-area-inset-top) + 60px);
    }
    .logo-area img {
      width: 120px; height: 120px; border-radius: 28px;
      object-fit: contain; background: rgba(255,255,255,0.07);
      padding: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    .logo-area h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.03em; text-align: center; line-height: 1.3; }
    .logo-area p { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #9DB4CC; margin-top: -10px; }
    .btn-stack {
      width: 100%; max-width: 380px;
      padding: 0 28px calc(env(safe-area-inset-bottom) + 60px);
      display: flex; flex-direction: column; gap: 16px;
    }
    .btn {
      display: flex; align-items: center; gap: 16px;
      width: 100%; padding: 20px 22px; border-radius: 20px;
      border: none; cursor: pointer; text-decoration: none;
      color: white; transition: transform 0.13s, filter 0.13s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); filter: brightness(0.85); }
    .btn-contact { background: linear-gradient(135deg, #1B4F8A 0%, #2666B8 100%); box-shadow: 0 6px 24px rgba(27,79,138,0.6); }
    .icon-wrap {
      width: 50px; height: 50px; border-radius: 14px;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .icon-wrap svg { width: 26px; height: 26px; }
    .btn-text { text-align: left; }
    .btn-label { font-size: 18px; font-weight: 700; display: block; letter-spacing: 0.01em; }
    .btn-sub { font-size: 12px; font-weight: 400; opacity: 0.72; margin-top: 3px; display: block; }
  </style>
</head>
<body>
  <div class="logo-area">
    <img src="icons/Alpine%20A-v2.png" alt="Alpine Sheet Metal Logo" />
    <h1>Alpine Sheet Metal<br>Systems</h1>
    <p>Field Operations</p>
  </div>
  <div class="btn-stack">
    <a class="btn btn-contact" href="https://contact-alpinesheetmetalsystems.com/service-requst">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>
      <div class="btn-text">
        <span class="btn-label">Service Request</span>
        <span class="btn-sub">Submit a new work order</span>
      </div>
    </a>
  </div>
</body>
</html>
